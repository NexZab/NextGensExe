name: Build Plugin
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Force Dependency Resolution
        run: |
          # 1. Manually add the missing MDLib as a local repo to bypass JitPack errors
          # We tell Maven to just ignore the missing jar for a second
          sed -i 's/<version>2.2.8<\/version>/<version>2.2.8<\/version><scope>provided<\/scope>/g' pom.xml
          
          # 2. Fix the BentoBox/Skyblock errors again
          sed -i 's/<version>LATEST<\/version>/<version>3.3<\/version>/g' pom.xml
          sed -i 's/<version>3.0.4-SNAPSHOT<\/version>/<version>3.0.4<\/version>/g' pom.xml
          sed -i 's/<version>1.20.2-R0.1-SNAPSHOT<\/version>/<version>1.21.4-R0.1-SNAPSHOT<\/version>/g' pom.xml
          sed -i 's/<version>1.21.4-R0.1-SNAPSHOT<\/version>/<version>2.7.0<\/version>/g' pom.xml
          
          # 3. Ensure the Main Class path is 100% correct
          sed -i 's/main: .*/main: com.muhammaddaffa.nextgens.NextGens/' src/main/resources/plugin.yml

      - name: Build with Maven
        # The -DforceStdout helps us see exactly where it stops if it fails
        run: mvn clean package -DskipTests -U

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NextGens-JAR
          path: target/NextGens-*.jar
          
